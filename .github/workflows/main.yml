name: Chorcha Automation Bot

on:
  workflow_dispatch:
    # Allows manual triggering of the workflow from the Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright and Browser Dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Run Chorcha Quiz Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHORCHA_PHONE: ${{ secrets.CHORCHA_PHONE }}
          CHORCHA_PASS: ${{ secrets.CHORCHA_PASS }}
          CHORCHA_COOKIES: ${{ secrets.CHORCHA_COOKIES }}
          CHORCHA_NAME: ${{ secrets.CHORCHA_NAME }}
          CHORCHA_AC: ${{ secrets.CHORCHA_AC }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PAT: ${{ secrets.PAT }}
          HEADLESS: 'true'
        run: |
          python bot.py
